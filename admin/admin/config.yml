backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "productos"
    label: "Productos"
    folder: "content/productos"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre del producto", name: "title", widget: "string"}
      - {label: "Precio (público)", name: "price", widget: "number", valueType: "float", min: 0}
      - {label: "Precio mayoreo", name: "wholesale", widget: "number", valueType: "float", min: 0}
      - {label: "Stock disponible", name: "stock", widget: "number", min: 0}
      - {label: "Imagen", name: "image", widget: "image"}
      - {label: "Descripción", name: "body", widget: "markdown", required: false}
